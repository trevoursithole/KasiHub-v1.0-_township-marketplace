services:
  - type: web
    name: kasihub
    env: node
    plan: free
    rootDir: .
    buildCommand: |
      cd backend && npm install
      cd ../frontend && npm install && npm run build
      cd ../backend && node src/db/seed.js
    startCommand: cd backend && node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: ./kasihub.db
      - key: FRONTEND_URL
        value: https://kasihub.onrender.com
