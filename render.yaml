services:
  - type: web
    name: kasihub
    env: node
    plan: free
    buildCommand: |
      npm install --prefix backend
      npm install --prefix frontend
      npm run build --prefix frontend
      node backend/src/db/seed.js
    startCommand: node backend/src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: ./kasihub.db
