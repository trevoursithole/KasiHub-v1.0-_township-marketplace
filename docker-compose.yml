version: '3.9'

services:
  kasihub:
    build: .
    container_name: kasihub
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_PATH: /data/kasihub.db
      # Set your own secret: docker-compose run -e JWT_SECRET=your-secret up
      # Or create a .env file next to docker-compose.yml with JWT_SECRET=your-secret
      JWT_SECRET: ${JWT_SECRET:-kasihub-change-this-secret-before-going-live}
      FRONTEND_URL: http://localhost:4000
    volumes:
      - kasihub_data:/data
      - kasihub_uploads:/app/backend/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  kasihub_data:
  kasihub_uploads:
