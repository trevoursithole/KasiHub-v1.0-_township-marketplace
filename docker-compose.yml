version: '3.9'

services:
  kasihub:
    build: .
    container_name: kasihub
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DB_PATH=/app/data/kasihub.db
      - JWT_SECRET=${JWT_SECRET:-kasihub-change-me-in-production}
      - FRONTEND_URL=http://localhost:4000
    volumes:
      - kasihub_data:/app/data
      - kasihub_uploads:/app/backend/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  kasihub_data:
  kasihub_uploads:
